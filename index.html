<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX Technology | Ultra Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation;
            user-select: none;
        }

        /* প্রিমিয়াম গাঢ় গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #01040a 0%, #0d1117 100%);
            color: #fff;
            overflow: hidden;
            position: fixed;
        }

        /* ব্যাকগ্রাউন্ড নিওন গ্লো (Animated Orbs) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.15;
            animation: move 25s infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #238636; top: -10%; left: -10%; } /* হালকা গ্রিন */
        .orb-2 { width: 500px; height: 500px; background: #1f6feb; bottom: -15%; right: -10%; } /* হালকা ব্লু */

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(60px, 60px) scale(1.1); }
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 420px;
            z-index: 10;
        }

        /* প্রিমিয়াম কাঁচের মতো কার্ড */
        .premium-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }

        .brand {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .instruction {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            opacity: 0.7;
            /* সব লেখা সাদা */
            color: #fff;
        }

        /* স্ক্রলিং লিঙ্ক লিস্টের কন্টেইনার */
        .links-container {
            width: 100%;
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            text-align: left;
            padding: 5px;
        }

        /* স্ক্রলবার হাইড করার জন্য (ঐচ্ছিক, তবে প্রিমিয়াম লাগে) */
        .links-container::-webkit-scrollbar {
            width: 6px;
        }
        .links-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .links-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* প্রতিটি লিঙ্ক আইটেম */
        .link-item {
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
            position: relative;
            /* সব লেখা সাদা */
            color: #fff;
        }

        .link-item:last-child {
            border: none;
        }

        /* হোভার এবং সিলেকশন ইফেক্ট */
        .link-item:hover {
            background: rgba(255, 255, 255, 0.04);
            padding-left: 25px;
        }

        .link-item.selected {
            background: rgba(31, 111, 235, 0.1);
            border-left: 3px solid #1f6feb;
            color: #fff; /* নিশ্চিত করা হল যে সিলেক্টেড লেখাও সাদাই থাকবে */
        }

        /* লঞ্চ বাটন */
        .launch-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #1f6feb 0%, #154694 100%);
            /* সব লেখা সাদা */
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(31, 111, 235, 0.3);
        }

        .launch-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(31, 111, 235, 0.5);
        }
        
        .launch-btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="premium-card">
            <div class="brand">GX TECH</div>
            
            <p class="instruction">দয়া করে একটি লিঙ্ক বেছে নিন</p>

            <div class="links-container" id="optionsList">
                <div class="link-item" style="opacity: 0.5; color: #fff;">লোড হচ্ছে...</div>
            </div>

            <button class="launch-btn" onclick="launchNow()">Launch Now</button>
        </div>
    </div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/XGSammim/GX-all-technology/main/links.json';
        let currentUrl = "";

        async function fetchLinks() {
            try {
                const res = await fetch(`${jsonUrl}?nocache=${Date.now()}`);
                const data = await res.json();
                const list = document.getElementById('optionsList');
                list.innerHTML = "";
                
                if (data.length === 0) {
                    list.innerHTML = '<div class="link-item" style="color: #fff;">কোনো লিঙ্ক পাওয়া যায়নি।</div>';
                    return;
                }

                data.forEach((item, index) => {
                    let div = document.createElement('div');
                    div.className = "link-item";
                    div.textContent = item.title;
                    
                    // ক্লিক ইভেন্ট - লিঙ্ক সিলেক্ট করার জন্য
                    div.onclick = function() {
                        // আগের সিলেক্টেড আইটেম থেকে ক্লাস রিমুভ করা
                        const currentSelected = document.querySelector('.link-item.selected');
                        if (currentSelected) {
                            currentSelected.classList.remove('selected');
                        }
                        
                        // নতুন আইটেম সিলেক্ট করা
                        div.classList.add('selected');
                        currentUrl = item.url;
                    };
                    list.appendChild(div);
                });
            } catch(e) { 
                document.getElementById('optionsList').innerHTML = '<div class="link-item" style="color: #ff4444;">ডেটা লোড করতে ব্যর্থ হয়েছে।</div>';
            }
        }

        function launchNow() {
            if(currentUrl) {
                window.location.href = currentUrl;
            } else {
                alert("দয়া করে একটি লিঙ্ক সিলেক্ট করুন!");
            }
        }
        
        // পেজ লোড হলেই ডেটা ফেচ করা
        fetchLinks();
    </script>
</body>
</html>
