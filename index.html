<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GX Technology | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050510;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* ব্যাকগ্রাউন্ডে ভাসমান রঙিন বল (Floating Orbs) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(0, 255, 136, 0.2); top: -10%; left: -5%; }
        .orb-2 { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.15); bottom: -10%; right: -5%; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* নিয়ন গ্লো র‍্যাপার */
        .neon-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
            padding: 2px; 
            border-radius: 35px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        /* এনিমেটেড নিয়ন বর্ডার */
        .neon-wrapper::before {
            content: "";
            position: absolute;
            inset: -1px;
            background: conic-gradient(from 0deg, transparent, #00ff88, transparent, #3b82f6, transparent);
            animation: rotate 4s linear infinite;
            border-radius: 36px;
            z-index: -1;
            filter: blur(8px);
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* গ্লাসমরফিজম কার্ড */
        .card {
            background: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 34px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
        }

        /* ইনপুট স্টাইল */
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .pass-input {
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 5px;
            outline: none;
            transition: 0.3s;
        }

        .pass-input:focus {
            border-color: #00ff88;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        /* বাটন স্টাইল */
        .btn-unlock {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #00ff88, #3b82f6);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .btn-unlock:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="neon-wrapper">
        <div class="card">
            <div class="brand">GX TECHNOLOGY</div>
            <div class="subtitle">Secure Verification</div>
            
            <div class="input-group">
                <input type="password" id="passInput" class="pass-input" placeholder="••••••">
                <div id="errorMsg" class="error-msg">ভুল পাসওয়ার্ড, আবার চেষ্টা করুন!</div>
            </div>

            <button class="btn-unlock" onclick="checkPassword()">Unlock System</button>
        </div>
    </div>

    <script>
        // আপনার কাঙ্খিত পাসওয়ার্ড এখানে দিন
        const CORRECT_PASSWORD = "123"; 

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('errorMsg');

            if (input === CORRECT_PASSWORD) {
                // পাসওয়ার্ড সঠিক হলে কোথায় যাবে সেটি এখানে দিন
                window.location.href = "YOUR_DASHBOARD_URL_HERE.html"; 
                alert("স্বাগতম! এক্সেস মঞ্জুর করা হয়েছে।");
            } else {
                error.style.display = "block";
                document.getElementById('passInput').value = "";
                // এনিমেশন ইফেক্ট
                document.querySelector('.card').animate([
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 200, iterations: 3 });
            }
        }

        // এন্টার চাপলে যেন কাজ করে
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
