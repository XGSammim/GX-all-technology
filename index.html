<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX Technology | Premium Static UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation;
            user-select: none;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050510;
            color: #fff;
            overflow: hidden;
            position: fixed; /* পেজ নড়াচড়া করবে না */
        }

        /* ব্যাকগ্রাউন্ডে ভাসমান রঙিন বল (Floating Orbs) - Cyberpunk Style */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: rgba(0, 255, 136, 0.15); top: -10%; left: -5%; }
        .orb-2 { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.1); bottom: -10%; right: -5%; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* মেইন কন্টেইনার */
        .neon-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* স্থির নিওন বর্ডার (ঘুরবে না) */
        .card-border {
            padding: 2px;
            border-radius: 35px;
            background: linear-gradient(135deg, #00ff88, #3b82f6);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        /* গ্লাসমরফিজম কার্ড */
        .card {
            background: rgba(13, 13, 18, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 33px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            font-size: 30px; font-weight: 900; letter-spacing: 3px; margin-bottom: 40px;
            background: linear-gradient(to bottom, #fff, #00ff88);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* কাস্টম ড্রপডাউন */
        .custom-select { position: relative; width: 100%; margin-bottom: 30px; text-align: left; }
        
        .select-trigger {
            width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: #fff; font-size: 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .select-trigger:hover { border-color: #00ff88; background: rgba(0,0,0,0.6); }

        .options-list {
            position: absolute; 
            top: 110%; 
            left: 0; 
            width: 100%;
            background: rgba(15, 15, 20, 0.95); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 22px; 
            overflow-y: auto; 
            max-height: 250px; 
            display: none; 
            z-index: 999; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .option-item {
            padding: 16px 20px; color: #ddd; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .option-item:last-child { border: none; }
        .option-item:hover { background: #00ff88; color: #000; font-weight: 700; }

        /* লঞ্চ বাটন */
        .btn-launch {
            width: 100%; padding: 20px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, #00ff88, #3b82f6);
            color: #000; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }
        .btn-launch:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .show { display: block !important; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="neon-wrapper">
        <div class="card-border">
            <div class="card">
                <div class="brand">GX TECHNOLOGY</div>
                
                <div class="custom-select">
                    <div class="select-trigger" onclick="toggleDropdown()">
                        <span id="selectedText">টাইটেল সিলেক্ট করুন</span>
                        <span>▼</span>
                    </div>
                    <div class="options-list" id="optionsList">
                        <div class="option-item">লোড হচ্ছে...</div>
                    </div>
                </div>

                <button class="btn-launch" onclick="launchNow()">Launch Now</button>
            </div>
        </div>
    </div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/guui68/Photo-to-text/main/links.json';
        let currentUrl = "";

        async function fetchLinks() {
            try {
                const res = await fetch(`${jsonUrl}?nocache=${Date.now()}`);
                const data = await res.json();
                const list = document.getElementById('optionsList');
                list.innerHTML = "";
                
                data.forEach(item => {
                    let div = document.createElement('div');
                    div.className = "option-item";
                    div.textContent = item.title;
                    div.onclick = function() {
                        document.getElementById('selectedText').innerText = item.title;
                        currentUrl = item.url;
                        toggleDropdown();
                    };
                    list.appendChild(div);
                });
            } catch(e) { 
                console.log("Load Error"); 
                document.getElementById('optionsList').innerHTML = '<div class="option-item">এরর! পুনরায় চেষ্টা করুন</div>';
            }
        }

        function toggleDropdown() {
            const list = document.getElementById('optionsList');
            if(!list.classList.contains('show')) fetchLinks();
            list.classList.toggle('show');
        }

        function launchNow() {
            if(currentUrl) window.location.href = currentUrl;
            else alert("দয়া করে একটি টাইটেল সিলেক্ট করুন!");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.custom-select')) {
                document.getElementById('optionsList').classList.remove('show');
            }
        }
        
        // প্রথম লোডেই ডাটা ফেচ করে রাখা
        fetchLinks();
    </script>
</body>
</html>
