<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX Technology | Deep Blue Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation;
            user-select: none;
        }

        /* ডার্ক এবং নীল কালারের গভীর মিশ্রণ */
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e1b4b 100%);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            color: #e2e8f0;
            overflow: hidden;
            position: fixed;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ব্যাকগ্রাউন্ড ওর্বস - আরও গাঢ় নীল */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.4;
        }
        .orb-1 { width: 400px; height: 400px; background: #1e40af; top: -15%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #312e81; bottom: -15%; right: -10%; }

        .neon-wrapper {
            position: relative;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* বর্ডারে সাদার বদলে নীলচে গ্লো */
        .card-border {
            padding: 1.5px;
            border-radius: 35px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            box-shadow: 0 0 40px rgba(30, 64, 175, 0.3);
        }

        /* কার্ডের ভেতরটা এখন অনেক ডার্ক ব্লু */
        .card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 55px 35px;
            border-radius: 33.5px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .brand {
            font-size: 30px; font-weight: 900; letter-spacing: 4px; margin-bottom: 45px;
            background: linear-gradient(to bottom, #93c5fd, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .custom-select { position: relative; width: 100%; margin-bottom: 35px; text-align: left; }
        
        .select-trigger {
            width: 100%; padding: 18px; 
            background: rgba(2, 6, 23, 0.6); 
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px; color: #cbd5e1; font-size: 16px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .select-trigger:hover { border-color: #3b82f6; background: rgba(30, 64, 175, 0.2); }

        .options-list {
            position: absolute; 
            top: 110%; 
            left: 0; 
            width: 100%;
            background: #0f172a; 
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 22px; 
            overflow-y: auto; 
            max-height: 250px; 
            display: none; 
            z-index: 999; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
        }

        .option-item {
            padding: 16px 20px; color: #94a3b8; cursor: pointer; 
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            transition: 0.2s;
        }
        .option-item:last-child { border: none; }
        .option-item:hover { background: #1e40af; color: #fff; font-weight: 700; }

        /* বাটন এখন নীল গ্রেডিয়েন্টে */
        .btn-launch {
            width: 100%; padding: 20px; border: none; border-radius: 22px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #fff; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }
        .btn-launch:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.5);
        }

        .show { display: block !important; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="neon-wrapper">
        <div class="card-border">
            <div class="card">
                <div class="brand">GX TECHNOLOGY</div>
                
                <div class="custom-select">
                    <div class="select-trigger" onclick="toggleDropdown()">
                        <span id="selectedText">টাইটেল সিলেক্ট করুন</span>
                        <span>▼</span>
                    </div>
                    <div class="options-list" id="optionsList">
                        <div class="option-item">লোড হচ্ছে...</div>
                    </div>
                </div>

                <button class="btn-launch" onclick="launchNow()">Launch Now</button>
            </div>
        </div>
    </div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/XGSammim/GX-download-store/main/data.json';
        let currentUrl = "";

        async function fetchLinks() {
            try {
                const res = await fetch(`${jsonUrl}?nocache=${Date.now()}`);
                const data = await res.json();
                const list = document.getElementById('optionsList');
                list.innerHTML = "";
                
                data.forEach(item => {
                    let div = document.createElement('div');
                    div.className = "option-item";
                    div.textContent = item.title;
                    div.onclick = function() {
                        document.getElementById('selectedText').innerText = item.title;
                        currentUrl = item.url;
                        toggleDropdown();
                    };
                    list.appendChild(div);
                });
            } catch(e) { 
                document.getElementById('optionsList').innerHTML = '<div class="option-item">ডাটা লোড করতে ব্যর্থ</div>';
            }
        }

        function toggleDropdown() {
            const list = document.getElementById('optionsList');
            if(!list.classList.contains('show')) fetchLinks();
            list.classList.toggle('show');
        }

        function launchNow() {
            if(currentUrl) window.location.href = currentUrl;
            else alert("দয়া করে একটি টাইটেল সিলেক্ট করুন!");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.custom-select')) {
                document.getElementById('optionsList').classList.remove('show');
            }
        }
        
        fetchLinks();
    </script>
</body>
</html>
