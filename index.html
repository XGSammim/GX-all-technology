<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GX Technology | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation;
            user-select: none;
        }

        /* প্রিমিয়াম ডার্ক ব্লু ব্যাকগ্রাউন্ড মিশ্রণ */
        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #e2e8f0;
            overflow: hidden;
            position: fixed;
        }

        /* হালকা নীল গ্লো ইফেক্ট (Animated Orbs) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }
        .orb-1 { width: 300px; height: 300px; background: #3b82f6; top: 10%; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: #1e40af; bottom: 10%; right: 10%; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 380px;
            z-index: 10;
        }

        /* গ্লাস কার্ড ডিজাইন */
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(59, 130, 246, 0.5);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .brand {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, #fff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* ড্রপডাউন ট্রিগার */
        .select-box {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
        }

        .select-btn {
            width: 100%;
            padding: 16px 20px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 15px;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s ease;
        }

        .select-btn:hover {
            border-color: #3b82f6;
            background: rgba(30, 64, 175, 0.2);
        }

        /* অপশন লিস্ট */
        .options-container {
            position: absolute;
            top: 110%;
            left: 0;
            width: 100%;
            background: #0f172a;
            border: 1.5px solid #3b82f6;
            border-radius: 15px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .option {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            transition: 0.2s;
            text-align: left;
        }

        .option:hover {
            background: rgba(59, 130, 246, 0.3);
            padding-left: 25px;
        }

        /* লঞ্চ বাটন */
        .launch-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.5);
        }

        .show { display: block !important; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="glass-card">
            <div class="brand">GX TECH</div>
            
            <div class="select-box">
                <div class="select-btn" onclick="toggleDropdown()">
                    <span id="selectedText">টাইটেল সিলেক্ট করুন</span>
                    <span style="font-size: 12px;">▼</span>
                </div>
                <div class="options-container" id="optionsList">
                    <div class="option" style="color: #fff;">লোড হচ্ছে...</div>
                </div>
            </div>

            <button class="launch-btn" onclick="launchNow()">Launch Now</button>
        </div>
    </div>

    <script>
        const jsonUrl = 'https://raw.githubusercontent.com/XGSammim/GX-all-technology/main/links.json';
        let currentUrl = "";

        async function fetchLinks() {
            try {
                const res = await fetch(`${jsonUrl}?nocache=${Date.now()}`);
                const data = await res.json();
                const list = document.getElementById('optionsList');
                list.innerHTML = "";
                
                data.forEach((item, index) => {
                    let div = document.createElement('div');
                    div.className = "option";
                    div.textContent = item.title;
                    
                    // হলুদ এবং সাদা কালারের মিশ্রণ
                    // জোড় সংখ্যা (0, 2, 4) হলে হলুদ, বিজোড় (1, 3, 5) হলে সাদা
                    div.style.color = (index % 2 === 0) ? "#FFD700" : "#FFFFFF";
                    
                    div.onclick = function() {
                        document.getElementById('selectedText').innerText = item.title;
                        currentUrl = item.url;
                        toggleDropdown();
                    };
                    list.appendChild(div);
                });
            } catch(e) { 
                document.getElementById('optionsList').innerHTML = '<div class="option" style="color: #ff4444;">ডাটা পাওয়া যায়নি</div>';
            }
        }

        function toggleDropdown() {
            const list = document.getElementById('optionsList');
            if(!list.classList.contains('show')) fetchLinks();
            list.classList.toggle('show');
        }

        function launchNow() {
            if(currentUrl) window.location.href = currentUrl;
            else alert("দয়া করে একটি অপশন বেছে নিন!");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.select-box')) {
                document.getElementById('optionsList').classList.remove('show');
            }
        }
        
        fetchLinks();
    </script>
</body>
</html>
